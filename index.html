<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BASTION - DTG Mission Control</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--orange:#f97316;--pink:#ec4899;--cyan:#06b6d4;
  --glass:12px;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.glass{background:var(--surface);backdrop-filter:blur(var(--glass));border:1px solid var(--border);border-radius:var(--radius)}
.glass:hover{background:var(--surface-hover);border-color:var(--border-light)}
.sprite{image-rendering:pixelated;image-rendering:crisp-edges}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.3s}
.pulse{animation:p 2.5s ease-in-out infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:0.35}}
.module{padding:6px 4px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s}
.module:hover{background:rgba(255,255,255,0.07);border-color:var(--border-light)}
.tab{padding:6px 16px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;color:var(--text3)}
.tab:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
.tab.active{color:#fff;background:rgba(255,255,255,0.08);border-color:var(--border-light)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.badge-active{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-new{background:rgba(6,182,212,0.15);color:var(--cyan)}
.badge-assigned{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-review{background:rgba(168,85,247,0.15);color:var(--purple)}
.badge-completed{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-archived{background:rgba(100,116,139,0.15);color:var(--text3)}
.badge-paused{background:rgba(234,179,8,0.15);color:var(--yellow)}
.badge-maintenance{background:rgba(168,85,247,0.15);color:var(--purple)}
.badge-critical{background:rgba(239,68,68,0.2);color:var(--red)}
.badge-high{background:rgba(249,115,22,0.15);color:var(--orange)}
.badge-normal{background:rgba(59,130,246,0.12);color:var(--blue)}
.badge-low{background:rgba(100,116,139,0.12);color:var(--text3)}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;color:var(--text3);background:rgba(255,255,255,0.04);border:1px solid var(--border)}
.pill{padding:4px 12px;font-size:11px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all 0.15s}
.pill:hover,.pill.on{color:#fff;background:rgba(255,255,255,0.08);border-color:var(--border-light)}
.quest-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;position:relative}
.quest-card:hover{background:var(--surface-hover);border-color:var(--border-light);transform:translateY(-1px)}
.quest-card.expanded{background:rgba(255,255,255,0.06);border-color:var(--border-light)}
.quest-card::before{content:'';position:absolute;top:8px;left:-4px;width:8px;height:8px;border-radius:50%;background:var(--text3)}
.quest-card[data-priority=critical]::before{background:var(--red);box-shadow:0 0 6px var(--red)}
.quest-card[data-priority=high]::before{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.quest-card[data-priority=normal]::before{background:var(--blue)}
.quest-card[data-priority=low]::before{background:var(--text3)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#161620;border:1px solid var(--border-light);border-radius:14px;padding:24px;width:480px;max-height:80vh;overflow-y:auto}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border 0.15s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--cyan)}
.modal select option{background:#161620}
.modal label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.btn{padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--cyan);color:#000}.btn-primary:hover{opacity:0.9}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border-light)}
.btn-sm{padding:4px 10px;font-size:10px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<header style="padding:8px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(13,13,26,0.9);backdrop-filter:blur(8px);z-index:50">
  <div style="display:flex;align-items:center;gap:16px">
    <span style="font-size:15px;font-weight:700;letter-spacing:0.15em;color:#fff">BASTION</span>
    <div style="display:flex;gap:4px" id="tabs">
      <div class="tab active" data-tab="agents" onclick="switchTab('agents')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:-3px">group</span> Agents</div>
      <div class="tab" data-tab="projects" onclick="switchTab('projects')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:-3px">folder_open</span> Projects</div>
      <div class="tab" data-tab="quests" onclick="switchTab('quests')"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:-3px">assignment</span> Quest Board</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div style="display:flex;align-items:center;gap:6px"><div class="dot pulse" style="width:7px;height:7px;background:var(--green)"></div><span class="mono" style="font-size:11px;color:var(--green)">5/6 Online</span></div>
    <span class="mono" style="font-size:11px;color:var(--text3)" id="clock"></span>
  </div>
</header>

<!-- MODAL (hidden by default) -->
<div id="modal-root"></div>

<!-- MAIN -->
<main style="flex:1;display:flex;overflow:hidden;padding:10px;gap:10px">
  <section style="flex:1;overflow-y:auto" id="content"></section>
  <aside style="width:290px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;overflow:hidden">
    <div class="glass" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="material-symbols-outlined" style="font-size:16px;color:var(--cyan)">monitoring</span>Agent Status
      </div>
      <div style="flex:1;overflow-y:auto" id="status"></div>
    </div>
    <div class="glass" style="height:230px;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="material-symbols-outlined" style="font-size:16px;color:var(--cyan)">terminal</span>Activity Log
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px 10px" id="log"></div>
    </div>
  </aside>
</main>

<script>
const B=location.pathname.endsWith('/')?location.pathname:location.pathname+'/';
const API='https://agentpc1.tail93ed18.ts.net';
let syncStatus='unknown'; // synced | local | error | unknown

// ===== AGENTS =====

  {id:'cody',name:'Cody',role:'Mission Control',s:'working',task:'Fleet monitoring',p:100,c:'var(--green)',hp:'98%',specs:'Hermes v0.6 \u00b7 minimax-m2.7',acts:['Fleet health check \u2014 nominal','Pinged Lake for research ETA','Routed pixel task to Goku','Bastion Protocol deployed','Cleared stale queue'],mods:['Fleet Monitor','Cron Jobs','Triggers','Timers','Heartbeat']},

// ===== PROJECTS =====
const PROJECTS=[
  {id:'bastion',name:'Bastion Dashboard',status:'active',progress:70,color:'var(--cyan)',lead:'cody',agents:['cody','lake','goku'],started:'2026-04-01',description:'Mission control dashboard for DTG agents.',tasks:{total:14,done:9,inProgress:3,blocked:0},repo:'stephen395/dtg-mission-control',tags:['frontend','dashboard']},
  {id:'audit-tool',name:'DTG Audit Tool',status:'maintenance',progress:92,color:'var(--green)',lead:'fish',agents:['fish','lake'],started:'2025-11-15',description:'Telecom wireless billing audit tool.',tasks:{total:28,done:26,inProgress:1,blocked:0},repo:'stephen395/dtg-audit-tool',tags:['telecom','billing']},
  {id:'fish-promo',name:'Fish Promo Automation',status:'active',progress:35,color:'var(--orange)',lead:'fish',agents:['fish','lake','cody'],started:'2026-03-28',description:'AT&T promo data to audit tool integration.',tasks:{total:8,done:3,inProgress:2,blocked:1},repo:null,tags:['automation','n8n']},
  {id:'n8n-auto',name:'n8n Automation Hub',status:'active',progress:55,color:'var(--blue)',lead:'cody',agents:['cody','lake'],started:'2026-03-20',description:'Workflow automation at automation.dedicatedtelecom.com.',tasks:{total:10,done:5,inProgress:3,blocked:0},repo:null,tags:['n8n','webhooks']},
  {id:'hermes-fleet',name:'Hermes Agent Fleet',status:'maintenance',progress:88,color:'var(--purple)',lead:'cody',agents:['cody','goku','fallingcave'],started:'2026-03-15',description:'Agent infra on AgentPC1.',tasks:{total:18,done:16,inProgress:1,blocked:0},repo:null,tags:['hermes','infra']},
  {id:'openclaw',name:'OpenClaw / NemoClaw',status:'active',progress:60,color:'var(--pink)',lead:'fish',agents:['fish','fallingcave','blockhead'],started:'2026-02-10',description:'Discord bot gateway, local inference, HubSpot skill.',tasks:{total:22,done:13,inProgress:4,blocked:1},repo:null,tags:['discord','inference']},
];
const STATUS_BADGE={active:'badge-active',paused:'badge-paused',completed:'badge-completed',maintenance:'badge-maintenance'};

// ===== QUESTS =====
const CATS={feature:'Feature',bugfix:'Bug Fix',research:'Research',infra:'Infrastructure',automation:'Automation'};
const CAT_ICON={feature:'build',bugfix:'bug_report',research:'science',infra:'dns',automation:'smart_toy'};
const CAT_COLOR={feature:'var(--cyan)',bugfix:'var(--red)',research:'var(--blue)',infra:'var(--purple)',automation:'var(--orange)'};
const ASSIGN_MAP={feature:['goku'],bugfix:['goku'],research:['lake'],infra:['fallingcave','cody'],automation:['fish','cody']};

function loadQuests(){try{return JSON.parse(localStorage.getItem('bastion_quests'))||[]}catch(e){return[]}}
function saveQuests(q){localStorage.setItem('bastion_quests',JSON.stringify(q));syncToAPI(q)}
async function syncToAPI(q){
  try{const r=await fetch(API+'/api/quests/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(q)});
  if(r.ok){syncStatus='synced'}else{syncStatus='error'}}catch{syncStatus='local'}
}
async function fetchFromAPI(){
  try{const r=await fetch(API+'/api/quests',{signal:AbortSignal.timeout(5000)});
  if(r.ok){const data=await r.json();if(data.length>0){syncStatus='synced';return data}};syncStatus='synced';return null}
  catch{syncStatus='local';return null}
}
async function initQuests(){
  const remote=await fetchFromAPI();
  if(remote&&remote.length>0){quests=remote;localStorage.setItem('bastion_quests',JSON.stringify(quests))}
  renderContent();
}

let quests=loadQuests();
if(!quests.length){
  // Seed example quests
  quests=[
    {id:'q001',title:'Add dark mode to Audit Tool',description:'Implement a dark/light theme toggle for the DTG Audit Tool. Should persist user preference in localStorage and apply to all report views.',category:'feature',priority:'normal',status:'active',assignedTo:['goku'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-04-01T10:00:00Z',completedAt:null,progress:40,tags:['frontend','css'],notes:[{time:'2026-04-01T10:05:00Z',agent:'cody',text:'Assigned to Goku \u2014 frontend feature'},{time:'2026-04-01T14:00:00Z',agent:'goku',text:'CSS variables scaffolded, toggle component built'}]},
    {id:'q002',title:'Research: WebSocket vs SSE for live updates',description:'Compare WebSocket and Server-Sent Events for real-time agent status updates in Bastion. Include latency benchmarks, reconnection handling, and browser support.',category:'research',priority:'high',status:'completed',assignedTo:['lake'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-03-30T09:00:00Z',completedAt:'2026-04-01T16:00:00Z',progress:100,tags:['research','realtime'],notes:[{time:'2026-03-30T09:10:00Z',agent:'cody',text:'Assigned to Lake'},{time:'2026-04-01T16:00:00Z',agent:'lake',text:'Completed. SSE recommended for status broadcasts. Report in research/'}]},
    {id:'q003',title:'Fix Verizon parser date format bug',description:'Verizon bills from March 2026 use a new date format (MM-DD-YYYY instead of MM/DD/YYYY). Parser throws on these bills.',category:'bugfix',priority:'critical',status:'active',assignedTo:['goku'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-04-02T08:00:00Z',completedAt:null,progress:20,tags:['parser','verizon'],notes:[{time:'2026-04-02T08:05:00Z',agent:'cody',text:'CRITICAL \u2014 assigned to Goku immediately'},{time:'2026-04-02T09:00:00Z',agent:'goku',text:'Root cause found: regex expects / not -. Fix in progress.'}]},
    {id:'q004',title:'Set up CloudWatch alarms for FallingCave',description:'Configure CPU, memory, and disk CloudWatch alarms on AWS VPS. Alert threshold: CPU >80% for 5min, disk >90%.',category:'infra',priority:'normal',status:'assigned',assignedTo:['fallingcave'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-04-02T11:00:00Z',completedAt:null,progress:0,tags:['aws','monitoring'],notes:[{time:'2026-04-02T11:02:00Z',agent:'cody',text:'Assigned to FallingCave \u2014 infra task'}]},
    {id:'q005',title:'Build HubSpot ticket auto-responder',description:'Create an n8n workflow that auto-acknowledges new HubSpot tickets with a templated response and assigns to the right inbox.',category:'automation',priority:'high',status:'active',assignedTo:['fish','cody'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-03-29T14:00:00Z',completedAt:null,progress:65,tags:['hubspot','n8n','email'],notes:[{time:'2026-03-29T14:10:00Z',agent:'cody',text:'Assigned to Fish + Cody collab'},{time:'2026-04-01T10:00:00Z',agent:'fish',text:'Webhook trigger built, template drafted'},{time:'2026-04-02T09:00:00Z',agent:'cody',text:'Inbox routing logic added. Testing.'}]},
    {id:'q006',title:'Research carrier 5G enterprise plans',description:'Survey AT&T, Verizon, T-Mobile enterprise 5G plans for Q2 2026. Compare pricing, data caps, and management features.',category:'research',priority:'low',status:'completed',assignedTo:['lake'],assignedBy:'cody',requestedBy:'stephen',createdAt:'2026-03-25T09:00:00Z',completedAt:'2026-03-28T15:00:00Z',progress:100,tags:['telecom','5g','research'],notes:[{time:'2026-03-28T15:00:00Z',agent:'lake',text:'Complete. Report in research/. AT&T Business Unlimited Elite best value for 50+ lines.'}]},
  ];
  saveQuests(quests);
}

let questFilter='active'; // active | completed | all
let questCatFilter=null;
let expandedQuest=null;

// ===== TAB STATE =====
let currentTab='agents';
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));renderContent()}

// ===== RENDER ROUTER =====
function renderContent(){
  if(currentTab==='agents') renderAgents();
  else if(currentTab==='projects') renderProjects();
  else renderQuests();
  renderSidebar();
}

// ===== AGENTS VIEW =====

  document.getElementById('content').innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start">${AGENTS.map(a=>{
    const off=a.s==='offline';

        <div style="width:56px;height:56px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">

        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:14px;font-weight:700;color:#fff">${a.name}</span><span class="mono" style="font-size:10px;color:${SC[a.s]};font-weight:500">${SL[a.s]}</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${a.role}</div>
          <div style="display:flex;gap:12px;margin-top:6px;font-size:11px"><span style="color:var(--text2)">Health <span style="color:${a.c};font-weight:600">${a.hp}</span></span><span class="mono" style="color:var(--text3);font-size:10px">${a.specs}</span></div>
        </div></div>
      <div style="margin:0 12px 8px;padding:8px 10px;background:rgba(0,0,0,0.25);border-radius:8px;border:1px solid rgba(255,255,255,0.04);max-height:80px;overflow-y:auto">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Recent Activity</div>
        ${a.acts.map((act,i)=>`<div style="font-size:11px;color:var(--text2);line-height:1.6;display:flex;gap:6px"><span class="mono" style="color:var(--text3);flex-shrink:0;font-size:10px">${String(14-i).padStart(2,'0')}:${String(30-i*7).padStart(2,'0')}</span>${act}</div>`).join('')}</div>

    </div>`}).join('')}</div>`;
}

// ===== PROJECTS VIEW =====
function renderProjects(){
  const ac=PROJECTS.filter(p=>p.status==='active').length,tt=PROJECTS.reduce((s,p)=>s+p.tasks.total,0),td=PROJECTS.reduce((s,p)=>s+p.tasks.done,0),tb=PROJECTS.reduce((s,p)=>s+p.tasks.blocked,0);
  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
      <div class="glass" style="padding:14px 16px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Projects</div><div style="font-size:28px;font-weight:700;color:#fff">${PROJECTS.length}</div><div style="font-size:11px;color:var(--green);margin-top:2px">${ac} active</div></div>
      <div class="glass" style="padding:14px 16px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Total Tasks</div><div style="font-size:28px;font-weight:700;color:#fff">${tt}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${td} completed</div></div>
      <div class="glass" style="padding:14px 16px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Completion</div><div style="font-size:28px;font-weight:700;color:#fff">${Math.round(td/tt*100)}%</div><div class="bar" style="margin-top:8px;height:6px"><div class="bar-fill" style="width:${Math.round(td/tt*100)}%;background:var(--green)"></div></div></div>
      <div class="glass" style="padding:14px 16px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Blocked</div><div style="font-size:28px;font-weight:700;color:${tb>0?'var(--red)':'#fff'}">${tb}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${tb>0?'needs attention':'all clear'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">${PROJECTS.map(p=>{
      const ag=p.agents.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);
      return `<div class="glass" style="display:flex;flex-direction:column;padding:16px">
        <div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:15px;font-weight:700;color:#fff">${p.name}</span><span class="badge ${STATUS_BADGE[p.status]}">${p.status}</span></div><div style="font-size:11px;color:var(--text3);margin-top:3px">${p.description}</div></div>
        <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--text2)">Progress</span><span class="mono" style="color:var(--text3)">${p.progress}%</span></div><div class="bar" style="height:6px"><div class="bar-fill" style="width:${p.progress}%;background:${p.color}"></div></div></div>
        <div style="display:flex;gap:12px;margin-bottom:12px;font-size:11px"><span style="color:var(--text2)">Tasks: <span style="color:#fff;font-weight:600">${p.tasks.done}</span><span style="color:var(--text3)">/${p.tasks.total}</span></span><span style="color:var(--yellow)">${p.tasks.inProgress} in progress</span>${p.tasks.blocked>0?`<span style="color:var(--red)">${p.tasks.blocked} blocked</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Team:</span><div style="display:flex;gap:4px">${ag.map(a=>`<div style="display:flex;align-items:center;gap:3px;padding:2px 6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px"><img src="${B}sprites/${a.id}.png" class="sprite" style="height:18px" alt="${a.name}"/><span style="font-size:10px;color:var(--text2)">${a.name}</span>${a.id===p.lead?'<span style="font-size:8px;color:var(--cyan)">LEAD</span>':''}</div>`).join('')}</div></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)"><div style="display:flex;gap:4px;flex-wrap:wrap">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><span style="font-size:10px;color:var(--text3)">${p.started}</span></div>
      </div>`}).join('')}</div>`;
}

// ===== QUEST BOARD =====
function renderQuests(){
  const active=quests.filter(q=>['new','assigned','active','review'].includes(q.status));
  const completed=quests.filter(q=>['completed','archived'].includes(q.status));
  const shown=questFilter==='active'?active:questFilter==='completed'?completed:quests;
  const filtered=questCatFilter?shown.filter(q=>q.category===questCatFilter):shown;

  document.getElementById('content').innerHTML=`
    <!-- Top bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-primary" onclick="openNewQuest()" style="display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:16px">add</span> New Quest</button>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px" title="Sync status with AgentPC1"><div class="dot" style="width:6px;height:6px;background:${syncStatus==='synced'?'var(--green)':syncStatus==='local'?'var(--yellow)':'var(--text3)'}"></div><span style="color:var(--text3)">${syncStatus==='synced'?'Synced':syncStatus==='local'?'Local only':'...'}</span></div>
        <div style="display:flex;gap:4px">
          <span class="pill ${questFilter==='active'?'on':''}" onclick="questFilter='active';questCatFilter=null;renderContent()">Active (${active.length})</span>
          <span class="pill ${questFilter==='completed'?'on':''}" onclick="questFilter='completed';questCatFilter=null;renderContent()">Archive (${completed.length})</span>
          <span class="pill ${questFilter==='all'?'on':''}" onclick="questFilter='all';questCatFilter=null;renderContent()">All</span>
        </div>
      </div>
      <div style="display:flex;gap:4px">${Object.keys(CATS).map(c=>`<span class="pill ${questCatFilter===c?'on':''}" onclick="questCatFilter=questCatFilter==='${c}'?null:'${c}';renderContent()" style="font-size:10px"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:-2px">${CAT_ICON[c]}</span> ${CATS[c]}</span>`).join('')}</div>
    </div>

    <!-- Board -->
    <div style="columns:2;column-gap:10px">
      ${filtered.length===0?'<div style="padding:40px;text-align:center;color:var(--text3)">No quests found. Post a new one!</div>':''}
      ${filtered.map(q=>{
        const isExp=expandedQuest===q.id;
        const agents=q.assignedTo.map(id=>AGENTS.find(a=>a.id===id)).filter(Boolean);
        const age=timeAgo(q.createdAt);
        return `<div class="quest-card ${isExp?'expanded':''}" data-priority="${q.priority}" style="break-inside:avoid;margin-bottom:10px" onclick="toggleQuest('${q.id}')">
          <!-- Header -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-left:8px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="badge badge-${q.priority}" style="font-size:8px">${q.priority}</span>
                <span style="font-size:13px;font-weight:700;color:#fff">${q.title}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:10px">
                <span style="color:${CAT_COLOR[q.category]}"><span class="material-symbols-outlined" style="font-size:11px;vertical-align:-2px">${CAT_ICON[q.category]}</span> ${CATS[q.category]}</span>
                <span class="badge badge-${q.status}" style="font-size:8px">${q.status}</span>
                <span style="color:var(--text3)">${age}</span>
              </div>
            </div>
            <div style="display:flex;gap:-4px">${agents.map(a=>`<img src="${B}sprites/${a.id}.png" class="sprite" style="height:22px;margin-left:-2px" title="${a.name}" alt="${a.name}"/>`).join('')}</div>
          </div>

          <!-- Progress -->
          ${q.progress>0?`<div style="margin:8px 0 0 8px"><div class="bar" style="height:3px"><div class="bar-fill" style="width:${q.progress}%;background:${CAT_COLOR[q.category]}"></div></div></div>`:''}

          <!-- Expanded details -->
          ${isExp?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);margin-left:8px" onclick="event.stopPropagation()">
            <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px">${q.description}</div>

            <!-- Assigned -->
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
              <span style="font-size:10px;color:var(--text3);text-transform:uppercase">Assigned:</span>
              ${agents.map(a=>`<div style="display:flex;align-items:center;gap:3px;padding:2px 6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px"><img src="${B}sprites/${a.id}.png" class="sprite" style="height:16px"/><span style="font-size:10px;color:var(--text2)">${a.name}</span></div>`).join('')}
              <span style="font-size:9px;color:var(--text3)">by ${q.assignedBy}</span>
            </div>

            <!-- Tags -->
            <div style="display:flex;gap:4px;margin-bottom:10px">${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>

            <!-- Notes timeline -->
            ${q.notes.length?`<div style="margin-bottom:10px">
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Updates</div>
              ${q.notes.map(n=>{
                const na=AGENTS.find(a=>a.id===n.agent);
                return `<div style="display:flex;gap:8px;font-size:11px;line-height:1.5;margin-bottom:4px;padding-left:8px;border-left:2px solid var(--border)">
                  <span class="mono" style="color:var(--text3);flex-shrink:0;font-size:10px">${n.time.slice(5,10)}</span>
                  <span style="color:var(--cyan);font-weight:600;flex-shrink:0">${na?na.name:n.agent}</span>
                  <span style="color:var(--text2)">${n.text}</span>
                </div>`}).join('')}
            </div>`:''}

            <!-- Use Cases (shown on completed quests) -->
            ${(q.status==='completed'||q.status==='archived')?`<div style="margin-bottom:10px;padding:10px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:8px">
              <div style="font-size:10px;color:var(--green);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:13px">lightbulb</span>What You Can Do With This</div>
              <div style="font-size:11px;color:var(--text2);line-height:1.6">${getUseCases(q)}</div>
              ${q.useCases?`<div style="margin-top:6px;font-size:11px;color:var(--text);font-weight:500">${q.useCases}</div>`:''}
            </div>`:''}

            <!-- Actions -->
            <div style="display:flex;gap:6px">
              ${q.status!=='completed'&&q.status!=='archived'?`<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();completeQuest('${q.id}')">Mark Complete</button>`:''}
              ${q.status==='completed'?`<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();archiveQuest('${q.id}')">Archive</button>`:''}
            </div>
          </div>`:''}
        </div>`}).join('')}
    </div>`;
}

function getUseCases(q){
  const cases={
    feature:['Integrate this feature with other tools in the DTG stack','Extend it to cover additional edge cases or carriers','Use it as a template for similar features in other projects','Demo it to clients as a value-add service'],
    bugfix:['This fix prevents the same issue from affecting other clients','Run a regression test across similar data formats','Document the root cause so agents can detect similar issues early','Check if the same pattern exists in other parsers/tools'],
    research:['Apply key findings to active projects immediately','Share insights with the agent fleet via shared_workspace','Use as training data for agent skill improvement','Create a follow-up quest to implement recommendations'],
    infra:['Monitor the deployed changes for 48h for stability','Document the setup for disaster recovery procedures','Apply same patterns to other infrastructure components','Set up automated health checks for this component'],
    automation:['Connect this workflow to other DTG systems via webhooks','Set up monitoring/alerts for when the automation fails','Extend to handle additional trigger conditions','Document the workflow for the team to maintain'],
  };
  const list=cases[q.category]||cases.feature;
  return list.map(c=>'<div style="margin-bottom:3px">\u2022 '+c+'</div>').join('');
}
function toggleQuest(id){expandedQuest=expandedQuest===id?null:id;renderContent()}
function completeQuest(id){const q=quests.find(x=>x.id===id);if(q){q.status='completed';q.progress=100;q.completedAt=new Date().toISOString();q.notes.push({time:new Date().toISOString(),agent:'cody',text:'Quest completed. Moving to archive.'});saveQuests(quests);renderContent()}}
function archiveQuest(id){const q=quests.find(x=>x.id===id);if(q){q.status='archived';saveQuests(quests);renderContent()}}
function timeAgo(iso){const d=Date.now()-new Date(iso).getTime(),h=Math.floor(d/3600000),dy=Math.floor(h/24);return dy>0?dy+'d ago':h>0?h+'h ago':'just now'}

// ===== NEW QUEST MODAL =====
function openNewQuest(){
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:16px;font-weight:700;color:#fff">Post New Quest</span>
        <span class="material-symbols-outlined" style="cursor:pointer;color:var(--text3)" onclick="closeModal()">close</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div><label>Title</label><input id="nq-title" placeholder="What needs to be done?"/></div>
        <div><label>Description</label><textarea id="nq-desc" rows="3" placeholder="Details, context, acceptance criteria..."></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label>Category</label><select id="nq-cat"><option value="feature">Feature</option><option value="bugfix">Bug Fix</option><option value="research">Research</option><option value="infra">Infrastructure</option><option value="automation">Automation</option></select></div>
          <div><label>Priority</label><select id="nq-pri"><option value="normal">Normal</option><option value="critical">Critical</option><option value="high">High</option><option value="low">Low</option></select></div>
        </div>
        <div><label>Tags (comma-separated)</label><input id="nq-tags" placeholder="e.g. frontend, css, audit"/></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitQuest()">Post Quest</button>
        </div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('nq-title').focus(),100);
}
function closeModal(){document.getElementById('modal-root').innerHTML=''}
function submitQuest(){
  const title=document.getElementById('nq-title').value.trim();
  const desc=document.getElementById('nq-desc').value.trim();
  const cat=document.getElementById('nq-cat').value;
  const pri=document.getElementById('nq-pri').value;
  const tags=document.getElementById('nq-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title){document.getElementById('nq-title').style.borderColor='var(--red)';return}
  const assigned=ASSIGN_MAP[cat]||['cody'];
  const q={id:'q'+Date.now(),title,description:desc||title,category:cat,priority:pri,status:'assigned',assignedTo:assigned,assignedBy:'cody',requestedBy:'stephen',createdAt:new Date().toISOString(),completedAt:null,progress:0,tags,notes:[{time:new Date().toISOString(),agent:'cody',text:`Assigned to ${assigned.map(id=>{const a=AGENTS.find(x=>x.id===id);return a?a.name:id}).join(', ')} \u2014 ${CATS[cat].toLowerCase()} task`}]};
  quests.unshift(q);
  saveQuests(quests);
  closeModal();
  questFilter='active';
  expandedQuest=q.id;
  renderContent();
}

// ===== SIDEBAR =====
function renderSidebar(){
  document.getElementById('status').innerHTML=AGENTS.map(a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onmouseenter="this.style.background='var(--surface-hover)'" onmouseleave="this.style.background='transparent'">
      <div class="dot${a.s!=='offline'?' pulse':''}" style="background:${SC[a.s]}"></div>
      <div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:600;color:#fff">${a.name}</span><span class="mono" style="font-size:10px;color:${SC[a.s]}">${SL[a.s]}</span></div>
        <div style="font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.task}</div>
        <div class="bar" style="margin-top:6px;height:3px"><div class="bar-fill" style="width:${a.p}%;background:${a.c}"></div></div></div>
    </div>`).join('');
  const L=[{t:'14:32',a:'Lake',c:'var(--blue)',m:'Research: AI dashboard innovations'},{t:'14:28',a:'Cody',c:'var(--green)',m:'Fleet health check \u2014 nominal'},{t:'14:15',a:'Claude',c:'var(--cyan)',m:'Quest Board deployed'},{t:'14:02',a:'Lake',c:'var(--blue)',m:'Agent collab workflow done'},{t:'13:55',a:'Goku',c:'var(--orange)',m:'Awaiting code review'},{t:'13:40',a:'Fish',c:'var(--pink)',m:'Batch 47 done (312 tok/s)'},{t:'13:22',a:'Cody',c:'var(--green)',m:'Protocol deployed'},{t:'13:10',a:'FallingCave',c:'var(--orange)',m:'AWS: all green'},{t:'12:58',a:'Lake',c:'var(--blue)',m:'Pixel art research complete'},{t:'12:44',a:'Cody',c:'var(--green)',m:'Heartbeat sweep 5/6'}];
  document.getElementById('log').innerHTML=L.map(l=>`<div style="display:flex;gap:8px;font-size:11px;line-height:1.7"><span class="mono" style="color:var(--text3);flex-shrink:0;font-size:10px">${l.t}</span><span style="color:${l.c};font-weight:600;flex-shrink:0">${l.a}</span><span style="color:var(--text2)">${l.m}</span></div>`).join('');
}

setInterval(()=>{const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('en-US',{hour12:false})},1000);
// Init: try API first, fallback to localStorage
initQuests().catch(()=>renderContent());
</script>
</body>
