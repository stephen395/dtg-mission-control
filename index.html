<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTG Mission Control - Virtual Office</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Password Gate */
  #lock-screen { position: fixed; inset: 0; z-index: 9999; background: #0d0f14; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; font-family: 'Press Start 2P', monospace; }
  #lock-screen.hidden { display: none; }
  #lock-screen .lock-icon { font-size: 48px; margin-bottom: 8px; image-rendering: pixelated; }
  #lock-screen h2 { color: #e8e9ed; font-size: 14px; font-weight: 700; letter-spacing: 2px; }
  #lock-screen p { color: #5a5e6e; font-size: 9px; }
  #lock-screen input { background: #1a1d28; border: 2px solid #2a2d3a; color: #e8e9ed; padding: 12px 20px; border-radius: 4px; font-size: 12px; width: 280px; text-align: center; font-family: 'Press Start 2P', monospace; outline: none; image-rendering: pixelated; }
  #lock-screen input:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,0.3); }
  #lock-screen button { background: #f97316; color: #fff; border: 2px solid #ea580c; padding: 10px 32px; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; font-family: 'Press Start 2P', monospace; }
  #lock-screen button:hover { background: #ea580c; transform: translateY(-1px); }
  #lock-screen .error { color: #ef4444; font-size: 9px; min-height: 16px; }
  #lock-screen .pixel-border { position: absolute; inset: 0; pointer-events: none; border: 4px solid #1a1d28; }
  #app-wrap { display: none; }
  #app-wrap.unlocked { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  :root {
    --bg-primary: #0d0f14; --bg-secondary: #141720; --bg-card: #1a1d28; --bg-card-hover: #1f2330;
    --border: #2a2d3a; --text-primary: #e8e9ed; --text-secondary: #8b8f9e; --text-muted: #5a5e6e;
    --accent-orange: #f97316; --accent-green: #22c55e; --accent-red: #ef4444; --accent-blue: #3b82f6;
    --accent-purple: #a855f7; --accent-yellow: #eab308; --accent-cyan: #06b6d4; --accent-teal: #14b8a6;
    --accent-gray: #6b7280;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow: hidden; }

  /* Top Bar */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; background: #0a0c10; border-bottom: 2px solid #1e2130; z-index: 100; flex-shrink: 0; }
  .top-bar-left { display: flex; align-items: center; gap: 12px; }
  .top-bar-logo { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent-orange); letter-spacing: 1px; }
  .top-bar-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--text-secondary); }
  .top-bar-right { display: flex; align-items: center; gap: 16px; }
  .top-bar-clock { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent-cyan); }
  .top-bar-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted); }
  .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }
  .live-dot.error { background: var(--accent-red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes typingBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  @keyframes screenFlicker { 0% { opacity: 0.2; } 100% { opacity: 0.5; } }

  /* Main Layout */
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* Left Sidebar */
  .sidebar-left { width: 220px; background: #0e1018; border-right: 2px solid #1e2130; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-section { padding: 12px; border-bottom: 1px solid #1e2130; }
  .sidebar-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--accent-orange); margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
  /* Filter tabs */
  .filter-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .filter-tab { flex: 1; padding: 5px 0; text-align: center; font-size: 8px; font-family: 'Press Start 2P', monospace; color: var(--text-muted); background: transparent; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .filter-tab:hover { background: #1a1d28; color: var(--text-secondary); }
  .filter-tab.active { background: var(--accent-orange); color: #fff; border-color: var(--accent-orange); }

  .agent-list-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; transition: background 0.15s; position: relative; }
  .agent-list-item:hover { background: #1a1d28; }
  .agent-list-item:hover .pin-btn { opacity: 1; }
  .agent-list-item.selected { background: #1f2330; border: 1px solid var(--border); }
  .pin-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.15s, color 0.15s; padding: 2px 4px; }
  .pin-btn:hover { color: var(--accent-orange); }
  .pin-btn.pinned { opacity: 1; color: var(--accent-orange); }
  .agent-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .agent-status-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .agent-status-dot.idle { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }
  .agent-status-dot.working { background: var(--accent-blue); box-shadow: 0 0 6px var(--accent-blue); }
  .agent-status-dot.offline { background: var(--accent-red); }
  .agent-list-name { font-size: 11px; font-weight: 600; flex: 1; }
  .agent-list-role { font-size: 8px; color: var(--text-muted); }
  .agent-list-channel { font-size: 8px; color: var(--text-muted); font-family: 'Press Start 2P', monospace; font-size: 6px; }

  /* Pinned agent cards on right sidebar */
  .pinned-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
  .pinned-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pinned-card-avatar { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; image-rendering: pixelated; overflow: hidden; }
  .pinned-card-avatar canvas { image-rendering: pixelated; width: 100%; height: 100%; }
  .pinned-card-name { font-size: 11px; font-weight: 700; }
  .pinned-card-status { font-size: 8px; padding: 1px 6px; border-radius: 8px; margin-left: auto; }
  .pinned-card-desk { height: 60px; background: #111318; border-radius: 4px; margin-bottom: 6px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .pinned-card-desk canvas { image-rendering: pixelated; }
  .pinned-card-task { font-size: 9px; color: var(--text-secondary); line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .pinned-card-task .task-label { color: var(--text-muted); font-size: 7px; font-family: 'Press Start 2P', monospace; display: block; margin-bottom: 2px; }
  .pinned-unpin { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 10px; padding: 2px; }
  .pinned-unpin:hover { color: var(--accent-red); }

  /* Stats mini cards */
  .stat-mini { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1a1d28; }
  .stat-mini:last-child { border: none; }
  .stat-mini-label { font-size: 9px; color: var(--text-muted); }
  .stat-mini-value { font-size: 10px; font-weight: 700; font-family: 'Press Start 2P', monospace; font-size: 8px; }

  /* Canvas Area */
  .canvas-area { flex: 1; position: relative; overflow: hidden; background: #0d0f14; }
  #officeCanvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

  /* Right Sidebar - Activity Feed */
  .sidebar-right { width: 280px; background: #0e1018; border-left: 2px solid #1e2130; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .feed-header { padding: 12px; border-bottom: 1px solid #1e2130; }
  .feed-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--accent-orange); letter-spacing: 1px; }
  .feed-scroll { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .feed-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #151822; }
  .feed-item:last-child { border: none; }
  .feed-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .feed-body { flex: 1; min-width: 0; }
  .feed-agent { font-size: 10px; font-weight: 600; }
  .feed-time { font-size: 8px; color: var(--text-muted); margin-left: 6px; }
  .feed-msg { font-size: 10px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .feed-channel { font-size: 8px; color: var(--text-muted); margin-top: 2px; }

  /* Agent Popup */
  .agent-popup { position: absolute; z-index: 200; background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px; padding: 16px; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; pointer-events: auto; }
  .agent-popup.visible { display: block; }
  .agent-popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .agent-popup-avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-family: 'Press Start 2P', monospace; image-rendering: pixelated; overflow: hidden; }
  .agent-popup-avatar canvas { image-rendering: pixelated; width: 100%; height: 100%; }
  .agent-popup-name { font-size: 14px; font-weight: 700; }
  .agent-popup-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .agent-popup-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
  .agent-popup-close:hover { color: var(--text-primary); }
  .agent-popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .agent-popup-field { }
  .agent-popup-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .agent-popup-value { font-size: 11px; color: var(--text-secondary); }
  .agent-popup-skills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .agent-popup-skill { padding: 2px 8px; border-radius: 4px; font-size: 9px; background: #1e2130; color: var(--text-secondary); border: 1px solid var(--border); }

  /* API Settings */
  .api-config { position: fixed; bottom: 12px; right: 12px; z-index: 100; }
  .api-config button { background: var(--bg-card); border: 2px solid var(--border); color: var(--text-muted); width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .api-config button:hover { border-color: var(--accent-orange); color: var(--text-primary); }
  .api-modal { display: none; position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
  .api-modal.show { display: flex; }
  .api-modal-box { background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px; padding: 24px; width: 400px; }
  .api-modal-box h3 { font-size: 16px; margin-bottom: 12px; }
  .api-modal-box input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; font-family: inherit; }
  .api-modal-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .api-modal-box button { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: inherit; }
  .api-modal-box .btn-save { background: var(--accent-orange); color: #fff; }
  .api-modal-box .btn-cancel { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); }
  .api-status { font-size: 11px; margin-bottom: 12px; padding: 6px 10px; border-radius: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }

  /* Responsive */
  @media (max-width: 1100px) { .sidebar-right { width: 240px; } .sidebar-left { width: 190px; } }
  @media (max-width: 900px) { .sidebar-right { display: none; } .sidebar-left { width: 180px; } }
  @media (max-width: 700px) { .sidebar-left { display: none; } }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="pixel-border"></div>
  <div class="lock-icon">&#x1F512;</div>
  <h2>DTG MISSION CONTROL</h2>
  <p>ENTER PASSWORD TO CONTINUE</p>
  <input type="password" id="lockPass" placeholder="********" autofocus>
  <button onclick="tryUnlock()">UNLOCK</button>
  <div class="error" id="lockError"></div>
</div>

<div id="app-wrap">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">DTG AGENTS TEAM</div>
      <div class="top-bar-title">VIRTUAL OFFICE</div>
    </div>
    <div class="top-bar-right">
      <div class="top-bar-status">
        <span class="live-dot" id="liveDot" title="Connecting..."></span>
        <span id="connectionText" style="font-size:9px;">Connecting...</span>
      </div>
      <div class="top-bar-clock" id="topClock">--:--:--</div>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Sidebar -->
    <div class="sidebar-left">
      <div class="sidebar-section">
        <div class="sidebar-title">TEAM STATUS</div>
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">ALL</button>
          <button class="filter-tab" data-filter="working" onclick="setFilter('working')">WORK</button>
          <button class="filter-tab" data-filter="idle" onclick="setFilter('idle')">IDLE</button>
          <button class="filter-tab" data-filter="offline" onclick="setFilter('offline')">OFF</button>
        </div>
        <div id="agentList"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">OFFICE STATS</div>
        <div id="officeStats"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">CHANNELS</div>
        <div id="channelList"></div>
      </div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <canvas id="officeCanvas"></canvas>
      <div class="agent-popup" id="agentPopup">
        <button class="agent-popup-close" onclick="closePopup()">&times;</button>
        <div id="agentPopupContent"></div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
      <div class="feed-header">
        <div class="feed-title">PINNED AGENTS</div>
      </div>
      <div class="feed-scroll" id="pinnedAgents">
        <div style="color:var(--text-muted);font-size:9px;text-align:center;padding:20px;font-family:'Press Start 2P',monospace;">Pin agents from the left panel</div>
      </div>
      <div style="border-top:1px solid #1e2130;">
        <div class="feed-header">
          <div class="feed-title">ACTIVITY FEED</div>
        </div>
        <div class="feed-scroll" id="activityFeed" style="max-height:250px;">
          <div style="color:var(--text-muted);font-size:10px;text-align:center;padding:20px;">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- API Settings -->
<div class="api-config">
  <button onclick="document.getElementById('apiModal').classList.add('show')" title="API Settings">&#x2699;</button>
</div>
<div class="api-modal" id="apiModal">
  <div class="api-modal-box">
    <h3>API Connection</h3>
    <div class="api-status" id="apiStatus" style="background:var(--bg-secondary);color:var(--text-muted);">Checking...</div>
    <input type="text" id="apiUrlInput" value="">
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">URL where server.js is running.</p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="document.getElementById('apiModal').classList.remove('show')">Cancel</button>
      <button class="btn-save" onclick="saveApiUrl()">Save & Test</button>
    </div>
  </div>
</div>

<script>
// =============================================
// PASSWORD GATE (preserved)
// =============================================
async function tryUnlock() {
  const input = document.getElementById('lockPass').value;
  if (input === atob('U3RlbGxpY2FsZW4xNTIwMjEh')) {
    sessionStorage.setItem('dtg_unlocked','1');
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app-wrap').classList.add('unlocked');
    initApp();
  } else {
    document.getElementById('lockError').textContent = 'ACCESS DENIED';
    document.getElementById('lockPass').value = '';
    document.getElementById('lockPass').focus();
  }
}
if (sessionStorage.getItem('dtg_unlocked') === '1') {
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app-wrap').classList.add('unlocked');
  window.addEventListener('DOMContentLoaded', initApp);
}
document.getElementById('lockPass').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// =============================================
// API CONNECTION (preserved)
// =============================================
const isSameOrigin = location.hostname !== 'stephen395.github.io';
const API_ENDPOINTS = [
  localStorage.getItem('dtg_api_url'),
  isSameOrigin ? (location.origin + '/api') : null,
  'https://remote-pc8.tail93ed18.ts.net/api',
  'http://localhost:3100/api'
].filter(Boolean);
let API_URL = API_ENDPOINTS[0];
let liveData = null;

async function fetchWithFallback(path) {
  for (const base of API_ENDPOINTS) {
    try {
      const resp = await fetch(base + path, { signal: AbortSignal.timeout(5000) });
      if (resp.ok) { API_URL = base; return resp; }
    } catch {}
  }
  throw new Error('All API endpoints unreachable');
}

// API Settings
document.getElementById('apiUrlInput').value = localStorage.getItem('dtg_api_url') || 'https://remote-pc8.tail93ed18.ts.net/api';
async function saveApiUrl() {
  const url = document.getElementById('apiUrlInput').value.replace(/\/+$/, '');
  const statusEl = document.getElementById('apiStatus');
  statusEl.textContent = 'Testing...'; statusEl.style.background = 'var(--bg-secondary)'; statusEl.style.color = 'var(--text-muted)';
  try {
    const resp = await fetch(url + '/health', { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      localStorage.setItem('dtg_api_url', url);
      statusEl.textContent = 'Connected! Reloading...'; statusEl.style.background = '#133022'; statusEl.style.color = '#22c55e';
      setTimeout(() => location.reload(), 1000);
    } else throw new Error('Status ' + resp.status);
  } catch (err) {
    statusEl.textContent = 'Failed: ' + err.message; statusEl.style.background = '#3b1518'; statusEl.style.color = '#ef4444';
  }
}

// =============================================
// AGENT DEFINITIONS (preserved)
// =============================================
const AGENT_DEFS = {
  cody: { id: 'cody', apiId: null, name: 'Cody', role: 'Mission Control / Delegator', emoji: '\u{1F573}\u{FE0F}', color: '#a855f7', colorName: 'purple', channel: '#cody-control', room: 'mission-control', defaultModel: 'Unknown', defaultSkills: ['delegation', 'task-routing', 'mission-planning'] },
  main: { id: 'main', apiId: 'main', name: 'FallingCave', role: 'Discord Bot (AWS)', emoji: '\u{1F573}\u{FE0F}', color: '#a855f7', colorName: 'purple', channel: '#falling-cave', room: 'server-room', defaultModel: 'claude-sonnet-4', defaultSkills: ['ddg-search', 'dtg-billread'] },
  fish: { id: 'fish', apiId: 'fish', name: 'Fish', role: 'Discord + Google Chat Bot', emoji: '\u{1F41F}', color: '#06b6d4', colorName: 'cyan', channel: '#fish', room: 'comms-center', defaultModel: 'claude-sonnet-4', defaultSkills: ['hubspot', 'email'] },
  goku: { id: 'goku', apiId: null, name: 'Goku', role: 'Coder / Tool Builder', emoji: '\u{1F4BB}', color: '#f97316', colorName: 'orange', channel: '#goku-forge', room: 'code-lab', defaultModel: 'qwen3-coder:480b', defaultSkills: ['coding', 'tool-building', 'debugging'] },
  lake: { id: 'lake', apiId: null, name: 'Lake', role: 'Research / Intelligence', emoji: '\u{1F50D}', color: '#3b82f6', colorName: 'blue', channel: '#lake-intel', room: 'intel-room', defaultModel: 'glm-5', defaultSkills: ['research', 'analysis', 'web-search'] },
  blockhead: { id: 'blockhead', apiId: null, name: 'Blockhead', role: 'Tencent VPS Bot', emoji: '\u{1F4E6}', color: '#6b7280', colorName: 'gray', channel: '#blockhead', room: 'server-room', defaultModel: 'Unknown', defaultSkills: ['discord-bot'] }
};

let agentStates = {};

function mergeAgentData(apiData) {
  agentStates = {};
  for (const [key, def] of Object.entries(AGENT_DEFS)) {
    const apiAgent = def.apiId ? apiData?.agents?.[def.apiId] : null;
    agentStates[key] = {
      ...def,
      status: apiAgent ? apiAgent.status : 'offline',
      currentModel: apiAgent?.currentModel || def.defaultModel,
      skills: apiAgent?.skills || def.defaultSkills,
      sessions: apiAgent?.sessions || [],
      totalMessages: apiAgent?.totalMessages || 0,
      todayMessages: apiAgent?.todayMessages || 0,
      lastActive: apiAgent?.lastActive || null
    };
  }
}

// =============================================
// SPRITE ASSET LOADER
// =============================================
const ASSETS_BASE = 'assets/';
const spriteImages = {};
let assetsLoaded = false;
let assetsToLoad = 0;
let assetsLoadedCount = 0;

// Agent-to-character-sprite mapping (char_0 through char_5)
const AGENT_CHAR_MAP = {
  cody: 3,      // char_3 - purple toned
  main: 3,      // char_3 - same purple (FallingCave)
  fish: 1,      // char_1 - blue toned
  goku: 2,      // char_2 - warm toned

// Character sprite sheet layout: 112x96
// 7 frames x 16px = 112 wide
// 3 directions x 32px = 96 tall (8px top padding per frame, 24px sprite)
// Row 0=down, Row 1=up, Row 2=right
// Frames: walk1, walk2(idle), walk3, type1, type2, read1, read2
const CHAR_FRAME_W = 16;
const CHAR_FRAME_H = 32;
const CHAR_DIRECTIONS = { down: 0, up: 1, right: 2 };

function loadImage(key, src) {
  assetsToLoad++;
  const img = new Image();
  img.onload = () => {
    spriteImages[key] = img;
    assetsLoadedCount++;
    if (assetsLoadedCount >= assetsToLoad) {
      assetsLoaded = true;
      if (officeCtx) renderOffice();
    }
  };
  img.onerror = () => {
    console.warn('Failed to load:', src);
    assetsLoadedCount++;
    if (assetsLoadedCount >= assetsToLoad) {
      assetsLoaded = true;
      if (officeCtx) renderOffice();
    }
  };
  img.src = src;
}

  // Floor tiles

const TILE = 16;
const SCALE = 3; // Render at 3x native for crisp pixel art
const OFFICE_W = 60;
const OFFICE_H = 40;

const ROOMS = {
  'comms-center':    { x: 1,  y: 1,  w: 18, h: 14, label: 'COMMS CENTER', color: '#06b6d4' },
  'conference':      { x: 20, y: 1,  w: 20, h: 14, label: 'CONFERENCE ROOM', color: '#8b8f9e' },

// Floor tile assignments per room (which floor_X.png to use)
const ROOM_FLOOR = {
  'comms-center': 1,
  'conference': 2,
  'code-lab': 3,
  'mission-control': 4,
  'break-room': 5,
  'intel-room': 1,
  'server-room': 0

function initCanvas() {
  officeCanvas = document.getElementById('officeCanvas');
  officeCtx = officeCanvas.getContext('2d');
  // Disable smoothing for pixel-perfect rendering
  officeCtx.imageSmoothingEnabled = false;

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Click handling
  officeCanvas.addEventListener('click', handleCanvasClick);

  // Start animation loop
  requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
  const container = document.getElementById('canvasArea');
  const cw = container.clientWidth;
  const ch = container.clientHeight;

  // Calculate scale to fit the office in the viewport
  const nativeW = OFFICE_W * TILE;
  const nativeH = OFFICE_H * TILE;
  const fitScale = Math.min(cw / nativeW, ch / nativeH);
  // Use integer-ish scale for crispness, minimum 2
  const renderScale = Math.max(2, Math.floor(fitScale * 2) / 2);

  officeCanvas.width = Math.floor(nativeW * renderScale);
  officeCanvas.height = Math.floor(nativeH * renderScale);

  // CSS size = fill container, centered
  officeCanvas.style.width = officeCanvas.width + 'px';
  officeCanvas.style.height = officeCanvas.height + 'px';
  officeCanvas.style.position = 'absolute';
  officeCanvas.style.left = Math.max(0, (cw - officeCanvas.width) / 2) + 'px';
  officeCanvas.style.top = Math.max(0, (ch - officeCanvas.height) / 2) + 'px';

  officeCtx.imageSmoothingEnabled = false;
  officeCtx.setTransform(renderScale, 0, 0, renderScale, 0, 0);

  renderOffice();
}

let lastRenderScale = 1;
function getRenderScale() {
  if (!officeCanvas) return 2;
  return officeCanvas.width / (OFFICE_W * TILE);
}

function gameLoop(timestamp) {
  animFrame++;
  if (animFrame % 4 === 0) { // ~15fps for pixel art feel
    renderOffice();
  }
  requestAnimationFrame(gameLoop);
}

// =============================================
// RENDERING
// =============================================
function renderOffice() {
  if (!officeCtx) return;
  const ctx = officeCtx;

  // Clear
  ctx.fillStyle = '#0d0f14';
  ctx.fillRect(0, 0, OFFICE_W * TILE, OFFICE_H * TILE);

  // Draw floors
  drawFloors(ctx);
  // Draw room walls and borders
  drawRoomBorders(ctx);
  // Draw hallway indicators
  drawHallways(ctx);
  // Draw furniture (z-sorted)
  drawAllFurniture(ctx);
  // Draw agents (z-sorted)
  drawAllAgents(ctx);
  // Draw room labels on top
  drawRoomLabels(ctx);
}

function drawFloors(ctx) {
  // Draw tiled floor for each room
  for (const [roomId, room] of Object.entries(ROOMS)) {
    const floorIdx = ROOM_FLOOR[roomId] || 0;
    const floorImg = spriteImages['floor_' + floorIdx];
    for (let tx = room.x; tx < room.x + room.w; tx++) {
      for (let ty = room.y; ty < room.y + room.h; ty++) {
        if (floorImg) {
          ctx.drawImage(floorImg, tx * TILE, ty * TILE, TILE, TILE);
        } else {
          // Fallback checkerboard
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#1a1d28' : '#1e2130';
          ctx.fillRect(tx * TILE, ty * TILE, TILE, TILE);
        }
      }
    }
  }

  // Hallway floors (darker pattern)
  const hallFloor = spriteImages['floor_0'];
  for (let tx = 0; tx < OFFICE_W; tx++) {
    for (let ty = 0; ty < OFFICE_H; ty++) {
      // Check if tile is inside any room
      let inRoom = false;
      for (const room of Object.values(ROOMS)) {
        if (tx >= room.x && tx < room.x + room.w && ty >= room.y && ty < room.y + room.h) {
          inRoom = true; break;
        }
      }
      if (!inRoom) {
        if (hallFloor) {
          ctx.globalAlpha = 0.4;
          ctx.drawImage(hallFloor, tx * TILE, ty * TILE, TILE, TILE);
          ctx.globalAlpha = 1.0;
        } else {
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#111318' : '#131520';
          ctx.fillRect(tx * TILE, ty * TILE, TILE, TILE);
        }
      }
    }
  }
}

function drawRoomBorders(ctx) {
  for (const [roomId, room] of Object.entries(ROOMS)) {
    const rx = room.x * TILE;
    const ry = room.y * TILE;
    const rw = room.w * TILE;
    const rh = room.h * TILE;

    // Wall top strip using wall sprite if available
    const wallImg = spriteImages['wall'];
    if (wallImg) {
      // Draw wall segments along the top of each room
      // wall_0.png is 64x128, we'll use the top portion as a horizontal wall
      for (let wx = 0; wx < rw; wx += TILE) {
        // Use a 16x16 section of the wall for the top border
        ctx.drawImage(wallImg, 0, 0, 16, 16, rx + wx, ry - TILE, TILE, TILE);
      }
    }

    // Room border
    ctx.strokeStyle = room.color;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 2 / getRenderScale();
    ctx.strokeRect(rx, ry, rw, rh);

    // Top accent glow
    ctx.fillStyle = room.color;
    ctx.globalAlpha = 0.2;
    ctx.fillRect(rx, ry, rw, 3);

    // Corner dots
    ctx.globalAlpha = 0.6;
    const cd = 3;
    ctx.fillRect(rx, ry, cd, cd);
    ctx.fillRect(rx + rw - cd, ry, cd, cd);
    ctx.fillRect(rx, ry + rh - cd, cd, cd);
    ctx.fillRect(rx + rw - cd, ry + rh - cd, cd, cd);

    ctx.globalAlpha = 1.0;
    ctx.lineWidth = 1;
  }
}

function drawHallways(ctx) {
  ctx.strokeStyle = '#2a2d3a';
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1 / getRenderScale();
  ctx.beginPath();
  ctx.moveTo(0, 15 * TILE); ctx.lineTo(OFFICE_W * TILE, 15 * TILE);
  ctx.moveTo(0, 28 * TILE); ctx.lineTo(OFFICE_W * TILE, 28 * TILE);
  ctx.moveTo(19 * TILE, 0); ctx.lineTo(19 * TILE, OFFICE_H * TILE);
  ctx.moveTo(40 * TILE, 0); ctx.lineTo(40 * TILE, OFFICE_H * TILE);
  ctx.stroke();
  ctx.globalAlpha = 1.0;
}

function drawSprite(ctx, key, x, y, w, h, alpha) {
  const img = spriteImages[key];
  if (!img) return false;
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.drawImage(img, x, y, w || img.width, h || img.height);
  if (alpha !== undefined) ctx.globalAlpha = 1.0;
  return true;
}

function drawServerLights(ctx, sx, sy) {
  // Animated blinking lights on server racks
  for (let j = 0; j < 6; j++) {
    const on1 = ((animFrame + j * 7) % 20) > 5;
    const on2 = ((animFrame + j * 11) % 25) > 8;
    ctx.fillStyle = on1 ? '#22c55e' : '#0a1a0a';
    ctx.globalAlpha = on1 ? 0.9 : 0.3;
    ctx.fillRect(sx + 4, sy + 4 + j * 5, 3, 2);
    ctx.fillStyle = on2 ? '#3b82f6' : '#0a0a1a';
    ctx.globalAlpha = on2 ? 0.7 : 0.2;
    ctx.fillRect(sx + 10, sy + 4 + j * 5, 3, 2);
  }
  ctx.globalAlpha = 1.0;
}

function drawAllAgents(ctx) {
  // Draw agents sorted by Y position for proper overlap
  const agentOrder = Object.entries(DESK_POS).sort((a, b) => a[1].y - b[1].y);

  for (const [agentId, pos] of agentOrder) {
    const state = agentStates[agentId];
    const status = state ? state.status : 'offline';
    const charIdx = AGENT_CHAR_MAP[agentId];
    const charImg = spriteImages['char_' + charIdx];

    const agentX = pos.x * TILE;
    const agentY = pos.y * TILE;

    if (charImg) {
      // Extract the correct frame from the sprite sheet
      // Direction: down (row 0), Frame selection based on status
      let frameIdx;
      if (status === 'online' || status === 'working') {
        // Type animation: alternate between frames 3 and 4 (type1, type2)
        frameIdx = 3 + ((animFrame >> 3) % 2);
      } else if (status === 'idle') {
        // Idle: use walk2 (standing pose), frame 1
        frameIdx = 1;
      } else {
        // Offline: standing, frame 1
        frameIdx = 1;
      }

      const srcX = frameIdx * CHAR_FRAME_W;
      const srcY = 0; // Down-facing row
      const drawW = CHAR_FRAME_W;
      const drawH = CHAR_FRAME_H;

      // Breathing animation
      const breathOff = status !== 'offline' ? Math.sin(animFrame * 0.08) * 0.5 : 0;

      // Alpha for offline agents
      if (status === 'offline') ctx.globalAlpha = 0.35;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(agentX, agentY + 2, 7, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Draw the character sprite
      ctx.drawImage(
        charImg,
        srcX, srcY, CHAR_FRAME_W, CHAR_FRAME_H,
        agentX - drawW / 2, agentY - drawH + 8 + breathOff, drawW, drawH
      );

      ctx.globalAlpha = 1.0;

      // Status indicator dot
      const statusColor = status === 'online' ? '#22c55e' : status === 'working' ? '#3b82f6' : status === 'idle' ? '#eab308' : '#ef4444';
      ctx.fillStyle = statusColor;
      ctx.beginPath();
      ctx.arc(agentX + 10, agentY - 22, 3, 0, Math.PI * 2);
      ctx.fill();

      // Pulse for active agents
      if (status === 'online' || status === 'working') {
        const pulseAlpha = 0.3 + Math.sin(animFrame * 0.08) * 0.2;
        ctx.fillStyle = statusColor;
        ctx.globalAlpha = pulseAlpha;
        ctx.beginPath();
        ctx.arc(agentX + 10, agentY - 22, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    } else {
      // Fallback: draw simple colored rectangle if sprite not loaded
      drawFallbackAgent(ctx, agentId, agentX, agentY, status);
    }

    // Name label
    const def = AGENT_DEFS[agentId];
    ctx.fillStyle = def.color;
    ctx.font = '5px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(def.name, agentX, agentY + 14);
    ctx.textAlign = 'left';
  }
}

function drawFallbackAgent(ctx, agentId, x, y, status) {
  const def = AGENT_DEFS[agentId];
  const col = def.color;
  const isOffline = status === 'offline';
  ctx.globalAlpha = isOffline ? 0.3 : 1.0;

  // Body
  ctx.fillStyle = col;
  ctx.fillRect(x - 5, y - 6, 10, 8);
  // Head
  ctx.fillStyle = isOffline ? '#555' : '#f0c8a0';
  ctx.beginPath();
  ctx.arc(x, y - 10, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1.0;
}

function drawRoomLabels(ctx) {
  ctx.font = '5px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  for (const [roomId, room] of Object.entries(ROOMS)) {
    ctx.fillStyle = room.color;
    ctx.globalAlpha = 0.8;
    ctx.fillText(room.label, (room.x + room.w / 2) * TILE, (room.y + 0.8) * TILE);
  }
  ctx.globalAlpha = 1.0;
  ctx.textAlign = 'left';
}

// =============================================
// CLICK HANDLING
// =============================================
function handleCanvasClick(e) {
  const rect = officeCanvas.getBoundingClientRect();
  const scale = getRenderScale();
  const mx = (e.clientX - rect.left) * (officeCanvas.width / rect.width) / scale;
  const my = (e.clientY - rect.top) * (officeCanvas.height / rect.height) / scale;

  for (const [agentId, pos] of Object.entries(DESK_POS)) {
    const ax = pos.x * TILE;
    const ay = pos.y * TILE;
    const dist = Math.sqrt((mx - ax) ** 2 + (my - ay) ** 2);
    if (dist < 24) {
      showAgentPopup(agentId, e);
      return;
    }
  }
  closePopup();
}

function showAgentPopup(agentId, clickEvent) {
  const state = agentStates[agentId];
  if (!state) return;
  selectedAgent = agentId;

  document.querySelectorAll('.agent-list-item').forEach(el => el.classList.remove('selected'));
  const sidebarItem = document.querySelector(`[data-agent-id="${agentId}"]`);
  if (sidebarItem) sidebarItem.classList.add('selected');

  const statusColors = { online: '#22c55e', idle: '#eab308', working: '#3b82f6', offline: '#ef4444' };
  const statusBgs = { online: '#0f2b1a', idle: '#2b2a15', working: '#152040', offline: '#2a1a1a' };
  const sc = statusColors[state.status] || statusColors.offline;
  const sb = statusBgs[state.status] || statusBgs.offline;

  // Create avatar canvas with sprite
  const charIdx = AGENT_CHAR_MAP[agentId];
  const charImg = spriteImages['char_' + charIdx];
  let avatarHtml = `<div class="agent-popup-avatar" style="background:${state.color}22;color:${state.color};font-size:20px;">${state.emoji}</div>`;

  if (charImg) {
    avatarHtml = `<div class="agent-popup-avatar" style="background:${state.color}22;" id="popupAvatar_${agentId}"></div>`;
  }

  const popup = document.getElementById('agentPopup');
  document.getElementById('agentPopupContent').innerHTML = `
    <div class="agent-popup-header">
      ${avatarHtml}
      <div>
        <div class="agent-popup-name" style="color:${state.color}">${state.name}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">${state.role}</div>
      </div>
      <div class="agent-popup-status" style="background:${sb};color:${sc};margin-left:auto;">${state.status.toUpperCase()}</div>
    </div>
    <div class="agent-popup-grid">
      <div class="agent-popup-field">
        <div class="agent-popup-label">MODEL</div>
        <div class="agent-popup-value">${state.currentModel || 'Unknown'}</div>
      </div>
      <div class="agent-popup-field">
        <div class="agent-popup-label">CHANNEL</div>
        <div class="agent-popup-value">${state.channel}</div>
      </div>
      <div class="agent-popup-field">
        <div class="agent-popup-label">SESSIONS</div>
        <div class="agent-popup-value">${state.sessions.length}</div>
      </div>
      <div class="agent-popup-field">
        <div class="agent-popup-label">LAST ACTIVE</div>
        <div class="agent-popup-value">${state.lastActive ? new Date(state.lastActive).toLocaleString() : 'Never'}</div>
      </div>
      <div class="agent-popup-field">
        <div class="agent-popup-label">TOTAL MSGS</div>
        <div class="agent-popup-value">${state.totalMessages}</div>
      </div>
      <div class="agent-popup-field">
        <div class="agent-popup-label">TODAY</div>
        <div class="agent-popup-value">${state.todayMessages}</div>
      </div>
    </div>
    <div class="agent-popup-label">SKILLS (${state.skills.length})</div>
    <div class="agent-popup-skills">
      ${state.skills.map(s => `<span class="agent-popup-skill">${s}</span>`).join('')}
    </div>
  `;

  // Render avatar sprite
  if (charImg) {
    const avatarEl = document.getElementById('popupAvatar_' + agentId);
    if (avatarEl) {
      const c = document.createElement('canvas');
      c.width = CHAR_FRAME_W; c.height = CHAR_FRAME_H;
      const ac = c.getContext('2d');
      ac.imageSmoothingEnabled = false;
      ac.drawImage(charImg, CHAR_FRAME_W, 0, CHAR_FRAME_W, CHAR_FRAME_H, 0, 0, CHAR_FRAME_W, CHAR_FRAME_H);
      avatarEl.appendChild(c);
    }
  }

  // Position popup
  if (clickEvent) {
    const canvasRect = document.getElementById('canvasArea').getBoundingClientRect();
    let px = clickEvent.clientX - canvasRect.left + 20;
    let py = clickEvent.clientY - canvasRect.top - 60;
    px = Math.min(px, canvasRect.width - 300);
    py = Math.max(10, Math.min(py, canvasRect.height - 300));
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';
  }

  popup.classList.add('visible');
}

function closePopup() {
  document.getElementById('agentPopup').classList.remove('visible');
  document.querySelectorAll('.agent-list-item').forEach(el => el.classList.remove('selected'));
  selectedAgent = null;
}

// =============================================
// UI RENDERING (preserved logic)
// =============================================
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  renderSidebar();
}

function togglePin(id, e) {
  e.stopPropagation();
  if (pinnedAgents.has(id)) pinnedAgents.delete(id);
  else pinnedAgents.add(id);
  localStorage.setItem('dtg_pinned', JSON.stringify([...pinnedAgents]));
  renderSidebar();
  renderPinnedAgents();
}

function renderSidebar() {
  const listEl = document.getElementById('agentList');
  const agentOrder = ['cody', 'main', 'fish', 'goku', 'lake', 'blockhead'];
  listEl.innerHTML = agentOrder.map(id => {
    const a = agentStates[id];
    if (!a) return '';
    if (currentFilter === 'working' && a.status !== 'online' && a.status !== 'working') return '';
    if (currentFilter === 'idle' && a.status !== 'idle') return '';
    if (currentFilter === 'offline' && a.status !== 'offline') return '';
    const isPinned = pinnedAgents.has(id);
    return `
      <div class="agent-list-item ${selectedAgent === id ? 'selected' : ''}" data-agent-id="${id}" onclick="showAgentPopup('${id}')">
        <div class="agent-status-dot ${a.status}"></div>
        <div style="flex:1;min-width:0;">
          <div class="agent-list-name" style="color:${a.color}">${a.name}</div>
          <div class="agent-list-role">${a.role}</div>
          <div class="agent-list-channel">${a.channel}</div>
        </div>
        <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${id}', event)" title="${isPinned ? 'Unpin' : 'Pin'}">&#x1F4CC;</button>
      </div>
    `;
  }).join('');

  // Stats
  const agents = Object.values(agentStates);
  const online = agents.filter(a => a.status === 'online' || a.status === 'working').length;
  const totalMsg = agents.reduce((s, a) => s + a.todayMessages, 0);
  const totalAll = agents.reduce((s, a) => s + a.totalMessages, 0);
  const totalSess = agents.reduce((s, a) => s + a.sessions.length, 0);

  document.getElementById('officeStats').innerHTML = `
    <div class="stat-mini">
      <span class="stat-mini-label">Agents Online</span>
      <span class="stat-mini-value" style="color:${online > 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${online}/${agents.length}</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Messages Today</span>
      <span class="stat-mini-value" style="color:var(--accent-cyan)">${totalMsg}</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Total Messages</span>
      <span class="stat-mini-value" style="color:var(--accent-orange)">${totalAll}</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Active Sessions</span>
      <span class="stat-mini-value" style="color:var(--accent-blue)">${totalSess}</span>
    </div>
  `;

  const channels = liveData?.channels || {};
  document.getElementById('channelList').innerHTML = `
    <div class="stat-mini">
      <span class="stat-mini-label">Discord</span>
      <span class="stat-mini-value" style="color:${channels.discord?.enabled ? 'var(--accent-green)' : 'var(--accent-red)'}">${channels.discord?.enabled ? 'ON' : 'OFF'}</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Google Chat</span>
      <span class="stat-mini-value" style="color:${channels.googlechat?.enabled ? 'var(--accent-green)' : 'var(--accent-red)'}">${channels.googlechat?.enabled ? 'ON' : 'OFF'}</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">WhatsApp</span>
      <span class="stat-mini-value" style="color:${channels.whatsapp?.enabled ? 'var(--accent-green)' : 'var(--accent-red)'}">${channels.whatsapp?.enabled ? 'ON' : 'OFF'}</span>
    </div>
  `;
}

function renderActivityFeed() {
  const feed = liveData?.recentActivity || [];
  const items = feed.filter(a => a.role === 'assistant').slice(0, 30);
  const el = document.getElementById('activityFeed');

  if (!items.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:10px;text-align:center;padding:20px;">No recent activity</div>';
    return;
  }

  el.innerHTML = items.map(a => {
    const agentColor = a.color === 'purple' ? 'var(--accent-purple)' : a.color === 'cyan' ? 'var(--accent-cyan)' : 'var(--text-secondary)';
    const dotColor = a.color === 'purple' ? '#a855f7' : a.color === 'cyan' ? '#06b6d4' : '#8b8f9e';
    return `
      <div class="feed-item">
        <div class="feed-dot" style="background:${dotColor}"></div>
        <div class="feed-body">
          <span class="feed-agent" style="color:${agentColor}">${a.agent}</span>
          <span class="feed-time">${timeAgo(a.timestamp)}</span>
          <div class="feed-msg">${escHtml(a.summary)}</div>
          <div class="feed-channel">via ${a.channel}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderPinnedAgents() {
  const el = document.getElementById('pinnedAgents');
  if (!pinnedAgents.size) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:9px;text-align:center;padding:20px;font-family:\'Press Start 2P\',monospace;">Pin agents from the left panel</div>';
    return;
  }
  el.innerHTML = [...pinnedAgents].map(id => {
    const a = agentStates[id];
    if (!a) return '';
    const statusColor = a.status === 'online' || a.status === 'working' ? 'var(--accent-green)' : a.status === 'idle' ? 'var(--accent-yellow)' : 'var(--accent-red)';
    const statusBg = a.status === 'online' || a.status === 'working' ? 'rgba(34,197,94,0.15)' : a.status === 'idle' ? 'rgba(234,179,8,0.15)' : 'rgba(239,68,68,0.15)';
    const statusLabel = a.status === 'online' ? 'ONLINE' : a.status === 'working' ? 'WORKING' : a.status === 'idle' ? 'IDLE' : 'OFFLINE';
    const feed = liveData?.recentActivity || [];
    const lastTask = feed.find(f => {
      const agentId = f.agentId || '';
      return (agentId === id || f.agent === a.name) && f.role === 'assistant';
    });
    const taskText = lastTask ? lastTask.summary : (a.status === 'offline' ? 'Agent is offline' : 'Waiting for tasks...');
    const isWorking = a.status === 'online' || a.status === 'working';
    return `
      <div class="pinned-card">
        <div class="pinned-card-header">
          <div class="pinned-card-avatar" style="background:${a.color}33;" id="pinnedAvatar_${id}">
          </div>
          <div>
            <div class="pinned-card-name" style="color:${a.color}">${a.name}</div>
          </div>
          <span class="pinned-card-status" style="color:${statusColor};background:${statusBg}">${statusLabel}</span>
          <button class="pinned-unpin" onclick="togglePin('${id}', event)" title="Unpin">&#x2715;</button>
        </div>
        <div class="pinned-card-desk" id="pinnedDesk_${id}">
        </div>
        <div class="pinned-card-task">
          <span class="task-label">${isWorking ? 'WORKING ON' : 'STATUS'}</span>
          ${escHtml(taskText)}
        </div>
      </div>
    `;
  }).join('');

  // Render mini sprite canvases for pinned agents
  for (const id of pinnedAgents) {
    renderPinnedMiniScene(id);
  }
}

function renderPinnedMiniScene(agentId) {
  const a = agentStates[agentId];
  if (!a) return;
  const charIdx = AGENT_CHAR_MAP[agentId];
  const charImg = spriteImages['char_' + charIdx];
  const isWorking = a.status === 'online' || a.status === 'working';

  // Avatar
  const avatarEl = document.getElementById('pinnedAvatar_' + agentId);
  if (avatarEl && charImg) {
    const ac = document.createElement('canvas');
    ac.width = CHAR_FRAME_W; ac.height = CHAR_FRAME_H;
    const actx = ac.getContext('2d');
    actx.imageSmoothingEnabled = false;
    actx.drawImage(charImg, CHAR_FRAME_W, 0, CHAR_FRAME_W, CHAR_FRAME_H, 0, 0, CHAR_FRAME_W, CHAR_FRAME_H);
    ac.style.imageRendering = 'pixelated';
    avatarEl.appendChild(ac);
  }

  // Mini desk scene
  const deskEl = document.getElementById('pinnedDesk_' + agentId);
  if (!deskEl) return;
  const mc = document.createElement('canvas');
  mc.width = 120; mc.height = 60;
  mc.style.imageRendering = 'pixelated';
  mc.style.width = '120px';
  mc.style.height = '60px';
  const mctx = mc.getContext('2d');
  mctx.imageSmoothingEnabled = false;

  // Scale up 2x for the mini scene
  mctx.scale(2, 2);

  // Floor
  const floorImg = spriteImages['floor_' + (ROOM_FLOOR[a.room] || 0)];
  if (floorImg) {
    for (let fx = 0; fx < 4; fx++) {
      for (let fy = 0; fy < 2; fy++) {
        mctx.drawImage(floorImg, fx * 16, fy * 16, 16, 16);
      }
    }
  } else {
    mctx.fillStyle = '#1a1d28';
    mctx.fillRect(0, 0, 60, 30);
  }

  // Desk
  const deskImg = spriteImages['desk_front'];
  if (deskImg) {
    mctx.drawImage(deskImg, 8, 16, 48, 16);
  }

  // Monitor
  const pcKey = isWorking ? ('pc_on_' + (1 + (animFrame >> 4) % 3)) : 'pc_off';
  const pcImg = spriteImages[pcKey];
  if (pcImg) {
    mctx.drawImage(pcImg, 22, 0, 16, 20);
  }

  // Character
  if (charImg) {
    const frameIdx = isWorking ? (3 + ((animFrame >> 3) % 2)) : 1;
    const srcX = frameIdx * CHAR_FRAME_W;
    if (a.status === 'offline') mctx.globalAlpha = 0.4;
    mctx.drawImage(charImg, srcX, 0, CHAR_FRAME_W, CHAR_FRAME_H, 22, -4, CHAR_FRAME_W, CHAR_FRAME_H);
    mctx.globalAlpha = 1.0;
  }

  deskEl.appendChild(mc);
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  return days + 'd ago';
}

// =============================================
// CLOCK
// =============================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('topClock').textContent = `${h}:${m}:${s}`;
}

// =============================================
// MAIN INIT & FETCH LOOP
// =============================================
let appInitialized = false;

async function initApp() {
  if (appInitialized) return;
  appInitialized = true;

  mergeAgentData(null);
  loadAllAssets();
  initCanvas();
  renderSidebar();
  updateClock();
  setInterval(updateClock, 1000);

  await fetchAndRender();
  setInterval(fetchAndRender, 30000);
  checkApiStatus();
}

async function fetchAndRender() {
  try {
    const resp = await fetchWithFallback('/dashboard');
    liveData = await resp.json();
    document.getElementById('liveDot').classList.remove('error');
    document.getElementById('liveDot').title = `Live (${API_URL}) - updated ${new Date().toLocaleTimeString()}`;
    document.getElementById('connectionText').textContent = 'LIVE';
    document.getElementById('connectionText').style.color = '#22c55e';
    mergeAgentData(liveData);
    renderSidebar();
    renderActivityFeed();
    renderPinnedAgents();
  } catch (err) {
    console.warn('API fetch failed:', err.message);
    document.getElementById('liveDot').classList.add('error');
    document.getElementById('liveDot').title = 'Offline - ' + err.message;
    document.getElementById('connectionText').textContent = 'OFFLINE';
    document.getElementById('connectionText').style.color = '#ef4444';
  }
}

async function checkApiStatus() {
  const statusEl = document.getElementById('apiStatus');
  try {
    const resp = await fetchWithFallback('/health');
    const d = await resp.json();
    statusEl.textContent = `Connected via ${API_URL} - uptime: ${Math.round(d.uptime)}s`;
    statusEl.style.background = '#133022'; statusEl.style.color = '#22c55e';
  } catch {
    statusEl.textContent = 'Not connected - no data shown';
    statusEl.style.background = '#3b1518'; statusEl.style.color = '#ef4444';
  }
}
</script>
