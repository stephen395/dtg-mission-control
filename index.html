<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;

  --glass:12px;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.glass{background:var(--surface);backdrop-filter:blur(var(--glass));border:1px solid var(--border);border-radius:var(--radius)}
.glass:hover{background:var(--surface-hover);border-color:var(--border-light)}
.sprite{image-rendering:pixelated;image-rendering:crisp-edges}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.3s}
.pulse{animation:p 2.5s ease-in-out infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:0.35}}
.module{padding:6px 4px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s}
.module:hover{background:rgba(255,255,255,0.07);border-color:var(--border-light)}
.tab{padding:6px 16px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;color:var(--text3)}
.tab:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
.tab.active{color:#fff;background:rgba(255,255,255,0.08);border-color:var(--border-light)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.badge-active{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-new{background:rgba(6,182,212,0.15);color:var(--cyan)}
.badge-assigned{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-review{background:rgba(168,85,247,0.15);color:var(--purple)}
.badge-completed{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-archived{background:rgba(100,116,139,0.15);color:var(--text3)}
.badge-paused{background:rgba(234,179,8,0.15);color:var(--yellow)}
.badge-maintenance{background:rgba(168,85,247,0.15);color:var(--purple)}

.badge-high{background:rgba(249,115,22,0.15);color:var(--orange)}
.badge-normal{background:rgba(59,130,246,0.12);color:var(--blue)}
.badge-low{background:rgba(100,116,139,0.12);color:var(--text3)}

.pill{padding:4px 12px;font-size:11px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all 0.15s}
.pill:hover,.pill.on{color:#fff;background:rgba(255,255,255,0.08);border-color:var(--border-light)}
.quest-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;position:relative}
.quest-card:hover{background:var(--surface-hover);border-color:var(--border-light);transform:translateY(-1px)}
.quest-card.expanded{background:rgba(255,255,255,0.06);border-color:var(--border-light)}
.quest-card::before{content:'';position:absolute;top:8px;left:-4px;width:8px;height:8px;border-radius:50%;background:var(--text3)}
.quest-card[data-priority=critical]::before{background:var(--red);box-shadow:0 0 6px var(--red)}
.quest-card[data-priority=high]::before{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.quest-card[data-priority=normal]::before{background:var(--blue)}
.quest-card[data-priority=low]::before{background:var(--text3)}

.modal{background:#161620;border:1px solid var(--border-light);border-radius:14px;padding:24px;width:480px;max-height:80vh;overflow-y:auto}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border 0.15s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--cyan)}
.modal select option{background:#161620}
.modal label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.btn{padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--cyan);color:#000}.btn-primary:hover{opacity:0.9}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border-light)}
.btn-sm{padding:4px 10px;font-size:10px}

.profile-rule{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--text2);padding:3px 0}

.chat-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:rgba(18,18,30,0.97);backdrop-filter:blur(16px);border-left:1px solid var(--border-light);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s ease;z-index:55}
.chat-panel.open{transform:translateX(0)}
body.chat-open main{margin-right:380px;transition:margin-right 0.25s ease}
body:not(.chat-open) main{transition:margin-right 0.25s ease}

.chat-msg-system{justify-content:center;padding:4px;opacity:0.5}

.mention-hl{color:var(--cyan);font-weight:600;background:rgba(6,182,212,0.1);padding:0 3px;border-radius:3px}
.chat-input-wrap{padding:10px 12px;border-top:1px solid var(--border);position:relative;flex-shrink:0}

.chat-input:focus{border-color:var(--cyan)}
.chat-send{position:absolute;right:18px;bottom:16px;background:none;border:none;cursor:pointer;color:var(--text3);transition:color 0.15s;display:flex;align-items:center}
.chat-send:hover{color:var(--cyan)}
.mention-popup{position:absolute;bottom:100%;left:12px;right:12px;background:#161620;border:1px solid var(--border-light);border-radius:8px;padding:4px;display:none;max-height:200px;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,0.5)}
.mention-popup.show{display:block}
.mention-opt{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.mention-opt:hover,.mention-opt.active{background:rgba(6,182,212,0.1)}

.mention-opt .name{font-size:12px;color:#fff;font-weight:600}
.mention-opt .role{font-size:10px;color:var(--text3)}

.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;min-height:220px}
.pipeline-col{display:flex;flex-direction:column;gap:6px}
.pipeline-col-head{padding:8px 10px;border-radius:8px 8px 0 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;display:flex;align-items:center;gap:6px}
.pipeline-card{padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:11px;transition:all 0.15s;border-left:3px solid transparent}

.req-row{display:grid;grid-template-columns:1fr 80px 70px 60px;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;transition:background 0.1s}
.req-row:hover{background:rgba(255,255,255,0.02)}
.req-row:last-child{border-bottom:none}
.trashed-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;font-size:10px;color:var(--text3);border-bottom:1px solid rgba(255,255,255,0.03)}

.heartbeat-dot.stale{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation:hbPulse 1.5s ease-in-out infinite}
.heartbeat-dot.dead{background:var(--red);box-shadow:0 0 8px var(--red);animation:hbPulse 1s ease-in-out infinite}
@keyframes hbPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}

</head>

function hbStatus(stage){
  const ts=PIPELINE_HEARTBEATS[stage];if(!ts)return'dead';
  const mins=(Date.now()-new Date(ts).getTime())/60000;
  if(mins<5)return'alive';if(mins<15)return'stale';return'dead';
}
function hbLabel(stage){
  const ts=PIPELINE_HEARTBEATS[stage];if(!ts)return'No activity';
  return'Last: '+timeAgo(ts);
}

function timeAgo(iso){
  if(!iso)return'';const ms=Date.now()-new Date(iso).getTime();
  const m=Math.floor(ms/60000),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>0)return d+'d ago';if(h>0)return h+'h ago';if(m>0)return m+'m ago';return'now';
}
function daysLeft(iso){
  const ms=new Date(iso).getTime()-Date.now();const d=Math.ceil(ms/86400000);

}

function removeProject(pid){
  const proj=PROJECTS.find(p=>p.id===pid);if(!proj)return;
  const rmQuests=document.getElementById('rm-quests')&&document.getElementById('rm-quests').checked;

  if(rmQuests){
    const projTags=new Set(proj.tags||[]);
    const projAgents=new Set(proj.agents||[]);
    quests=quests.filter(q=>{
      if(['completed','archived'].includes(q.status))return true; // keep completed
      const qTags=new Set(q.tags||[]);
      const qAgents=new Set(q.assignedTo||[]);
      const tagOverlap=[...qTags].some(t=>projTags.has(t));
      const agentOverlap=[...qAgents].some(a=>projAgents.has(a));
      return !(tagOverlap||agentOverlap); // remove if related
    });
    saveQuests(quests);
  }

  // Remove project from array
  const idx=PROJECTS.findIndex(p=>p.id===pid);
  if(idx>-1)PROJECTS.splice(idx,1);
  saveProjects();
  dispatchEvent('project_removed',{projectId:pid,name:proj.name,agents:proj.agents||[],removedQuests:rmQuests});
  closeModal();
  renderContent();
}

        <div><label>${isBlocker?'Description':'Log Entry'}</label><textarea id="pl-text" rows="${isBlocker?3:2}" placeholder="${isBlocker?'Details about the blocker, impact, and what needs to happen...':'What happened? Status update, decision, milestone...'}"></textarea></div>
        ${isBlocker?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label>Severity</label><select id="pl-severity"><option value="high">High</option><option value="critical">Critical</option><option value="normal">Normal</option></select></div>
          <div><label>Assign To</label><select id="pl-assign">${AGENTS.filter(a=>a.s!=='offline').map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
        </div>`:`<div><label>Type</label><select id="pl-type"><option value="update">Update</option><option value="milestone">Milestone</option></select></div>`}
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-ghost" onclick="closeModal();openProjectDetail('${pid}')">Cancel</button>
          <button class="btn ${isBlocker?'btn-danger':'btn-primary'}" onclick="submitProjectLog('${pid}','${type}')">${isBlocker?'Report Blocker':'Add Log'}</button>
        </div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById(isBlocker?'pl-title':'pl-text').focus(),100);
}

function submitProjectLog(pid,type){
  const proj=PROJECTS.find(p=>p.id===pid);if(!proj)return;
  if(!proj.logs)proj.logs=[];
  if(!proj.blockers)proj.blockers=[];
  const isBlocker=type==='blocker';

  if(isBlocker){
    const title=document.getElementById('pl-title').value.trim();
    const desc=document.getElementById('pl-text').value.trim();
    const severity=document.getElementById('pl-severity').value;
    const assignTo=document.getElementById('pl-assign').value;
    if(!title){document.getElementById('pl-title').style.borderColor='var(--red)';return}
    const b={id:'b'+Date.now(),title,description:desc||title,reporter:'stephen',reportedAt:new Date().toISOString(),severity,assignedTo:assignTo};
    proj.blockers.push(b);
    proj.tasks.blocked=(proj.tasks.blocked||0)+1;
    proj.logs.push({time:new Date().toISOString(),agent:'stephen',type:'blocker',text:title});
    dispatchEvent('project_blocker',{projectId:pid,name:proj.name,blocker:title,severity,agents:[assignTo]});
  }else{
    const text=document.getElementById('pl-text').value.trim();
    const logType=document.getElementById('pl-type').value;
    if(!text){document.getElementById('pl-text').style.borderColor='var(--red)';return}
    proj.logs.push({time:new Date().toISOString(),agent:'stephen',type:logType,text});
    dispatchEvent('project_update',{projectId:pid,name:proj.name,text,type:logType,agents:proj.agents||[]});
  }
  saveProjects();
  closeModal();
  openProjectDetail(pid);
}

function resolveBlocker(pid,bid){
  const proj=PROJECTS.find(p=>p.id===pid);if(!proj)return;
  proj.blockers=(proj.blockers||[]).filter(b=>b.id!==bid);
  proj.tasks.blocked=Math.max(0,(proj.tasks.blocked||0)-1);
  proj.logs.push({time:new Date().toISOString(),agent:'stephen',type:'milestone',text:'Blocker resolved.'});
  saveProjects();
  dispatchEvent('blocker_resolved',{projectId:pid,name:proj.name,agents:proj.agents||[]});
  openProjectDetail(pid);
}

function saveProfile(id){

  const a=AGENTS.find(x=>x.id===id);
  if(a&&a.profile) Object.assign(a.profile,edits);

}

// ===== ACTIVITY FEED (real data) =====
function buildActivityFeed(){
  const items=[];
  const agentColor=id=>{const a=AGENTS.find(x=>x.id===id);return a?a.c:'var(--text3)'};
  const agentName=id=>{const a=AGENTS.find(x=>x.id===id);return a?a.name:id==='stephen'?'Stephen':id||'System'};
  const fmtTime=iso=>{if(!iso)return'--:--';const d=new Date(iso);return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})};

  // 1. Chat messages (non-system, last 20)
  const msgs=(typeof chatMessages!=='undefined'?chatMessages:[]).filter(m=>m.senderType!=='system');
  msgs.slice(-20).forEach(m=>{
    const txt=m.text.length>60?m.text.slice(0,57)+'...':m.text;
    items.push({ts:m.timestamp,t:fmtTime(m.timestamp),a:agentName(m.sender),c:m.sender==='stephen'?'var(--cyan)':agentColor(m.sender),m:txt});
  });

  // 2. Quest notes (last note per quest, up to 10 quests)
  quests.slice(0,15).forEach(q=>{
    const notes=(q.notes||[]);
    notes.slice(-1).forEach(n=>{
      const label=q.status==='completed'?'Completed: '+q.title
        :q.status==='archived'?'Archived: '+q.title
        :(n.text.length>50?n.text.slice(0,47)+'...':n.text);
      items.push({ts:n.time,t:fmtTime(n.time),a:agentName(n.agent),c:agentColor(n.agent),m:label});
    });
  });

  // 3. Quest creation events
  quests.slice(0,10).forEach(q=>{
    items.push({ts:q.createdAt,t:fmtTime(q.createdAt),a:agentName(q.assignedBy||'cody'),c:agentColor(q.assignedBy||'cody'),m:'Quest: '+q.title});
  });

  // 4. Quest completions
  quests.filter(q=>q.completedAt).slice(0,5).forEach(q=>{
    items.push({ts:q.completedAt,t:fmtTime(q.completedAt),a:agentName((q.assignedTo||[])[0]||'cody'),c:agentColor((q.assignedTo||[])[0]||'cody'),m:'\u2705 '+q.title});
  });

  // Sort by timestamp descending, take top 15
  items.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
  return items.slice(0,15);
}

  // Build real activity feed from chat, quests, and project changes
  const feed=buildActivityFeed();
  document.getElementById('log').innerHTML=feed.length?feed.map(l=>`<div style="display:flex;gap:8px;font-size:11px;line-height:1.7"><span class="mono" style="color:var(--text3);flex-shrink:0;font-size:10px">${l.t}</span><span style="color:${l.c};font-weight:600;flex-shrink:0">${l.a}</span><span style="color:var(--text2)">${l.m}</span></div>`).join('')
    :'<div style="padding:12px;text-align:center;font-size:11px;color:var(--text3)">No activity yet</div>';
}

setInterval(()=>{const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('en-US',{hour12:false})},1000);
// Tab click listeners (using event delegation for reliability)
document.getElementById('tabs').addEventListener('click',function(e){
  const btn=e.target.closest('.tab');
  if(btn&&btn.dataset.tab){switchTab(btn.dataset.tab)}
});

// ===== EVENT DISPATCH (relay changes to agents) =====
// Every significant action in Bastion pushes an event to the API.
// Agents poll GET /api/events to pick up changes addressed to them.
function dispatchEvent(type,data){
  const evt={
    id:'evt_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
    type:type,
    source:'bastion-dashboard',
    actor:'stephen',
    timestamp:new Date().toISOString(),
    data:data,
    targets:data.agents||data.targets||[] // which agents need to see this
  };
  // Store locally for activity feed
  const evts=loadEvents();evts.push(evt);
  if(evts.length>200)evts.splice(0,evts.length-200);
  localStorage.setItem('bastion_events',JSON.stringify(evts));
  // Push to API for agents to poll
  fetch(API+'/api/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(evt)}).catch(()=>{});
}
function loadEvents(){try{return JSON.parse(localStorage.getItem('bastion_events'))||[]}catch{return[]}}

// ===== CHAT / COMMS =====
let chatOpen=false;
let chatMessages=loadChat();
let mentionIdx=-1, mentionStart=-1;

function loadChat(){try{return JSON.parse(localStorage.getItem('bastion_chat'))||[]}catch{return[]}}
function saveChatLocal(){localStorage.setItem('bastion_chat',JSON.stringify(chatMessages))}
function syncChatToAPI(){
  fetch(API+'/api/chat/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(chatMessages)}).catch(()=>{});
}

function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatPanel').classList.toggle('open',chatOpen);
  document.getElementById('chatToggle').classList.toggle('open',chatOpen);
  document.body.classList.toggle('chat-open',chatOpen);
  if(chatOpen){
    renderChatMessages();
    scrollChatBottom();
    document.getElementById('chatBadge').classList.remove('show');
    document.getElementById('chatBadge').textContent='0';
    setTimeout(()=>document.getElementById('chatInput').focus(),200);
  }
}

function renderChatMessages(){
  const el=document.getElementById('chatMessages');
  if(!chatMessages.length){
    el.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;opacity:0.4"><span class="material-symbols-outlined" style="font-size:40px;color:var(--text3)">forum</span><span style="font-size:12px;color:var(--text3)">No messages yet. Type @ to mention an agent.</span></div>';
    document.getElementById('chatCount').textContent='0 messages';
    return;
  }
  let html='';let prevSender=null;
  chatMessages.forEach((m,i)=>{
    if(m.senderType==='system'){
      html+=`<div class="chat-msg chat-msg-system"><span>${m.text}</span></div>`;
      prevSender=null;return;
    }
    const grouped=prevSender===m.sender;
    const agent=AGENTS.find(a=>a.id===m.sender);
    const senderName=m.sender==='stephen'?'Stephen':agent?agent.name:m.sender;
    const senderColor=m.sender==='stephen'?'var(--cyan)':agent?agent.c:'var(--text2)';
    const timeStr=m.timestamp?new Date(m.timestamp).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}):'';

    if(grouped){
      html+=`<div class="chat-msg chat-msg-grouped"><div style="font-size:12px;color:var(--text2);line-height:1.5">${highlightMentions(m.text)}</div></div>`;
    }else{
      html+=`<div class="chat-msg">
        <div style="width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
          ${m.sender==='stephen'?'<span class="material-symbols-outlined" style="font-size:18px;color:var(--cyan)">person</span>'
          :agent?`<img src="${B}sprites/${agent.id}.png" class="sprite" style="height:28px"/>`
          :'<span class="material-symbols-outlined" style="font-size:18px;color:var(--text3)">smart_toy</span>'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;gap:8px"><span style="font-size:12px;font-weight:700;color:${senderColor}">${senderName}</span><span class="mono" style="font-size:9px;color:var(--text3)">${timeStr}</span></div>
          <div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:2px">${highlightMentions(m.text)}</div>
        </div>
      </div>`;
    }
    prevSender=m.sender;
  });
  el.innerHTML=html;
  document.getElementById('chatCount').textContent=chatMessages.length+' message'+(chatMessages.length!==1?'s':'');
}

function highlightMentions(text){
  return text.replace(/@(\w+)/g,(match,name)=>{
    const agent=AGENTS.find(a=>a.name.toLowerCase()===name.toLowerCase()||a.id===name.toLowerCase());
    return agent?`<span class="mention-hl">@${agent.name}</span>`:match;
  });
}

function scrollChatBottom(){
  const el=document.getElementById('chatMessages');
  setTimeout(()=>{el.scrollTop=el.scrollHeight},50);
}

function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  closeMentionPopup();
  const mentions=[];
  text.replace(/@(\w+)/g,(_,name)=>{
    const agent=AGENTS.find(a=>a.name.toLowerCase()===name.toLowerCase()||a.id===name.toLowerCase());
    if(agent&&!mentions.includes(agent.id))mentions.push(agent.id);
  });
  const msg={
    id:'m'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
    sender:'stephen',senderType:'human',
    text:text,mentions:mentions,
    timestamp:new Date().toISOString(),
    replyTo:null
  };
  chatMessages.push(msg);
  saveChatLocal();
  syncChatToAPI();
  if(mentions.length>0) dispatchEvent('chat_mention',{messageId:msg.id,text:text,agents:mentions});
  input.value='';input.style.height='36px';
  renderChatMessages();
  scrollChatBottom();
  // Simulate agent acknowledgment if mentioned
  if(mentions.length>0){
    setTimeout(()=>{
      mentions.forEach(agentId=>{
        const a=AGENTS.find(x=>x.id===agentId);
        if(!a||a.s==='offline')return;
        const ack={
          id:'m'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
          sender:agentId,senderType:'agent',
          text:getAgentAck(agentId,text),mentions:['stephen'],
          timestamp:new Date().toISOString(),replyTo:msg.id
        };
        chatMessages.push(ack);
        saveChatLocal();
        if(chatOpen){renderChatMessages();scrollChatBottom()}
        else{
          const badge=document.getElementById('chatBadge');
          const n=parseInt(badge.textContent||'0')+1;
          badge.textContent=n;badge.classList.add('show');
        }
      });
    },1200+Math.random()*2000);
  }
}

function getAgentAck(id,userText){
  const acks={
    cody:['Copy that. On it.','Acknowledged. Routing now.','Got it — will coordinate.','Understood. Assigning resources.'],
    lake:['Noted. Pulling research now.','On it — will report back shortly.','Received. Starting analysis.','Got it. Will have findings ready.'],
    goku:['Roger. Starting build.','Got it — writing code now.','Acknowledged. Let me check the codebase.','On it. Will push when ready.'],
    fallingcave:['Acknowledged. Checking infra.','Copy. Reviewing AWS status.','Got it — monitoring now.','On it. Will report back.'],
    blockhead:['Received. Checking systems.','Got it. Running diagnostics.','Acknowledged.','On it.'],
    fish:['Got it. Checking accounts now.','Copy that — pulling billing data.','Acknowledged. Running audit.','On it boss. Will report back.'],
  };
  const list=acks[id]||['Acknowledged.'];
  return list[Math.floor(Math.random()*list.length)];
}

// @Mention autocomplete
function chatInputHandler(){
  const input=document.getElementById('chatInput');
  // Auto-resize
  input.style.height='36px';
  input.style.height=Math.min(input.scrollHeight,100)+'px';
  // Mention detection
  const val=input.value;
  const cur=input.selectionStart;
  const before=val.substring(0,cur);
  const atIdx=before.lastIndexOf('@');
  if(atIdx===-1||(atIdx>0&&before[atIdx-1]!==' '&&before[atIdx-1]!=='\n')){closeMentionPopup();return}
  const query=before.substring(atIdx+1).toLowerCase();
  if(query.includes(' ')){closeMentionPopup();return}
  mentionStart=atIdx;
  const matches=query.length===0?AGENTS:AGENTS.filter(a=>a.name.toLowerCase().startsWith(query)||a.id.startsWith(query));
  if(!matches.length){closeMentionPopup();return}
  mentionIdx=0;
  showMentionPopup(matches);
}

function showMentionPopup(agents){
  const popup=document.getElementById('mentionPopup');
  popup.innerHTML=agents.map((a,i)=>`<div class="mention-opt ${i===0?'active':''}" data-id="${a.id}" onclick="selectMention('${a.id}')">
    <img src="${B}sprites/${a.id}.png" class="sprite" alt="${a.name}"/>
    <span class="name">${a.name}</span>
    <span class="role">${a.role}</span>
    <span style="margin-left:auto"><span class="dot" style="width:6px;height:6px;background:${SC[a.s]}"></span></span>
  </div>`).join('');
  popup.classList.add('show');
}

function closeMentionPopup(){
  document.getElementById('mentionPopup').classList.remove('show');
  mentionStart=-1;mentionIdx=-1;
}

function selectMention(agentId){
  const agent=AGENTS.find(a=>a.id===agentId);if(!agent)return;
  const input=document.getElementById('chatInput');
  const val=input.value;
  const before=val.substring(0,mentionStart);
  const after=val.substring(input.selectionStart);
  input.value=before+'@'+agent.name+' '+after;
  const newPos=mentionStart+agent.name.length+2;
  input.focus();
  input.setSelectionRange(newPos,newPos);
  closeMentionPopup();
}

function chatKeydown(e){
  const popup=document.getElementById('mentionPopup');
  if(popup.classList.contains('show')){
    const items=popup.querySelectorAll('.mention-opt');
    if(e.key==='ArrowDown'){e.preventDefault();mentionIdx=(mentionIdx+1)%items.length;items.forEach(i=>i.classList.remove('active'));items[mentionIdx].classList.add('active');return}
    if(e.key==='ArrowUp'){e.preventDefault();mentionIdx=(mentionIdx-1+items.length)%items.length;items.forEach(i=>i.classList.remove('active'));items[mentionIdx].classList.add('active');return}
    if(e.key==='Tab'||e.key==='Enter'){
      if(items[mentionIdx]){e.preventDefault();selectMention(items[mentionIdx].dataset.id);return}
    }
    if(e.key==='Escape'){e.preventDefault();closeMentionPopup();return}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}
}

// Seed initial chat if empty
if(!chatMessages.length){
  chatMessages=[
    {id:'m_sys1',sender:'system',senderType:'system',text:'Mission Comms initialized — type @agent to get their attention',timestamp:new Date(Date.now()-3600000).toISOString(),mentions:[]},
    {id:'m_init1',sender:'cody',senderType:'agent',text:'Fleet online. 5/6 agents reporting. Blockhead is in standby.',timestamp:new Date(Date.now()-3500000).toISOString(),mentions:[]},
    {id:'m_init2',sender:'lake',senderType:'agent',text:'Research queue clear. Standing by for assignments.',timestamp:new Date(Date.now()-3200000).toISOString(),mentions:[]},
    {id:'m_init3',sender:'fish',senderType:'agent',text:'Local inference warm. HubSpot scan completed — 0 new tickets.',timestamp:new Date(Date.now()-2800000).toISOString(),mentions:[]},
  ];
  saveChatLocal();
}

// Init: render immediately, then try API sync in background
renderContent();
initQuests();
fetchRequests();
setInterval(fetchRequests,30000); // poll requests every 30s
</script>
